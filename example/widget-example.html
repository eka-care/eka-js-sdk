<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EkaScribe Widget - Client Integration Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

    .topbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 18px; }
    .topbar .env-badge { font-size: 11px; background: #e3f2fd; color: #1565c0; padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    .config-bar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .config-bar .field { display: flex; flex-direction: column; gap: 3px; }
    .config-bar label { font-size: 11px; color: #888; font-weight: 600; }
    .config-bar input, .config-bar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; }
    .config-bar input:focus, .config-bar select:focus { outline: none; border-color: #6c5ce7; }
    .btn-init { padding: 7px 16px; background: #6c5ce7; color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-init:hover { opacity: 0.9; }
    .btn-init:disabled { opacity: 0.4; cursor: not-allowed; }

    .content { padding: 24px; max-width: 900px; margin: 0 auto; }
    .section-title { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 12px; }

    /* Patient list */
    .patient-list { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .patient-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid #f0f0f0; }
    .patient-row:last-child { border-bottom: none; }
    .patient-info { flex: 1; }
    .patient-name { font-size: 14px; font-weight: 600; }
    .patient-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .btn-mic { width: 36px; height: 36px; border-radius: 50%; background: #6c5ce7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
    .btn-mic:hover { transform: scale(1.1); }
    .btn-mic:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn-mic svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }

    /* Callback log */
    .log { background: #1e1e1e; border-radius: 8px; padding: 16px; margin-top: 24px; max-height: 300px; overflow-y: auto; }
    .log-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .log-entry { font-family: 'SF Mono', Consolas, monospace; font-size: 11px; padding: 3px 0; color: #ccc; border-bottom: 1px solid #2a2a2a; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #616161; margin-right: 8px; }
    .log-cb { color: #ce93d8; }
    .log-data { color: #81c784; }
    .log-err { color: #e57373; }

    .init-hint { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>EkaScribe Widget Example</h1>
  <span class="env-badge" id="envBadge">NOT INITIALIZED</span>
</div>

<!-- Config bar — fill once -->
<div class="config-bar">
  <div class="field">
    <label>Access Token *</label>
    <input type="text" id="accessToken" placeholder="Your token" style="width:200px;" />
  </div>
  <div class="field">
    <label>Env</label>
    <select id="env">
      <option value="DEV">DEV</option>
      <option value="PROD">PROD</option>
    </select>
  </div>
  <div class="field">
    <label>Alliance Base URL *</label>
    <input type="text" id="baseUrl" placeholder="https://..." style="width:220px;" />
  </div>
  <div class="field">
    <label>Template ID *</label>
    <input type="text" id="templateId" placeholder="e.g. clinical_notes_template" style="width:180px;" />
  </div>
  <div class="field">
    <label>Language</label>
    <select id="inputLang">
      <option value="en-IN">English (India)</option>
      <option value="hi">Hindi</option>
      <option value="en">English</option>
    </select>
  </div>
  <div class="field">
    <label>Theme</label>
    <select id="theme">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
  </div>
  <button class="btn-init" id="btnInit" onclick="handleInit()">Initialize SDK + Widget</button>
</div>

<!-- Main content -->
<div class="content">

  <div id="initHint" class="init-hint">
    Fill config above and click "Initialize SDK + Widget" to begin.
  </div>

  <!-- Patient list — shown after init -->
  <div id="patientSection" style="display:none;">
    <p class="section-title">Patients — Click mic to start recording</p>
    <div class="patient-list" id="patientList"></div>

    <!-- Callback log -->
    <div class="log">
      <div class="log-title">Widget Callbacks</div>
      <div id="logContainer"></div>
    </div>
  </div>

</div>

<script type="module">
  import { getEkaScribeInstance } from '../eka-sdk/ekascribe-v2rx/index.ts';

  let ekascribe = null;

  // ─── Sample patient data ────────────────────────────────────

  const patients = [
    { id: 'p-001', name: 'Ravi Kumar',     age: 45, gender: 'M', mobile: '9876543210' },
    { id: 'p-002', name: 'Priya Sharma',   age: 32, gender: 'F', mobile: '9876543211' },
    { id: 'p-003', name: 'Amit Patel',     age: 58, gender: 'M', mobile: '9876543212' },
    { id: 'p-004', name: 'Sunita Verma',   age: 27, gender: 'F', mobile: '9876543213' },
  ];

  // ─── Logger ─────────────────────────────────────────────────

  function log(callbackName, data, isError = false) {
    const container = document.getElementById('logContainer');
    const entry = document.createElement('div');
    const time = new Date().toLocaleTimeString('en-US', {
      hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
    const cls = isError ? 'log-err' : 'log-data';
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${time}</span><span class="log-cb">${callbackName}</span> <span class="${cls}">${JSON.stringify(data)}</span>`;
    container.prepend(entry);
  }

  // ─── Render patient list ────────────────────────────────────

  function renderPatients() {
    const list = document.getElementById('patientList');
    list.innerHTML = '';
    patients.forEach((p) => {
      const row = document.createElement('div');
      row.className = 'patient-row';
      row.innerHTML = `
        <div class="patient-info">
          <div class="patient-name">${p.name}</div>
          <div class="patient-meta">${p.age}y, ${p.gender} &middot; ${p.mobile}</div>
        </div>
      `;
      const btn = document.createElement('button');
      btn.className = 'btn-mic';
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>';
      btn.addEventListener('click', () => startForPatient(p));
      row.appendChild(btn);
      list.appendChild(row);
    });
  }

  // ─── Initialize SDK + Widget (one-time) ─────────────────────

  window.handleInit = function () {
    const accessToken = document.getElementById('accessToken').value.trim();
    const baseUrl = document.getElementById('baseUrl').value.trim();
    const templateId = document.getElementById('templateId').value.trim();

    if (!accessToken || !baseUrl || !templateId) {
      alert('Access Token, Alliance Base URL, and Template ID are required.');
      return;
    }

    const env = document.getElementById('env').value;
    const theme = document.getElementById('theme').value;
    const inputLang = document.getElementById('inputLang').value;

    // ──────────────────────────────────────────────────────────
    // THIS IS ALL THE CLIENT NEEDS TO DO FOR INIT:
    // ──────────────────────────────────────────────────────────
    ekascribe = getEkaScribeInstance({
      access_token: accessToken,
      env,
      allianceConfig: { baseUrl },
      widget: {
        enabled: true,
        theme,
        primaryColor: '#6c5ce7',
        sessionDefaults: {
          input_language: [inputLang],
          output_format_template: [{ template_id: templateId }],
          model_type: 'pro',
          mode: 'consultation',
        },
        callbacks: {
          onRecordingStart: (data) => log('onRecordingStart', data),
          onRecordingPause: (data) => log('onRecordingPause', data),
          onRecordingResume: (data) => log('onRecordingResume', data),
          onRecordingStop: (data) => log('onRecordingStop', data),
          onProcessingStart: (data) => log('onProcessingStart', data),
          onProcessingComplete: (data) => {
            log('onProcessingComplete', data);
            // Client can use data.sessionData here
          },
          onError: (data) => log('onError', data, true),
          onWidgetClose: (data) => log('onWidgetClose', data),
        },
      },
    });
    // ──────────────────────────────────────────────────────────

    // Update UI
    document.getElementById('envBadge').textContent = `${env} — Widget Active`;
    document.getElementById('envBadge').style.background = '#e8f5e9';
    document.getElementById('envBadge').style.color = '#2e7d32';
    document.getElementById('btnInit').disabled = true;
    document.getElementById('initHint').style.display = 'none';
    document.getElementById('patientSection').style.display = 'block';
    renderPatients();
    log('SDK_INIT', { env, theme }, false);
  };

  // ─── Start recording for a patient (one call per patient) ──

  function startForPatient(patient) {
    if (!ekascribe) return;

    // ──────────────────────────────────────────────────────────
    // THIS IS ALL THE CLIENT NEEDS PER PATIENT:
    // ──────────────────────────────────────────────────────────
    ekascribe.startForPatient({
      txn_id: `${patient.id}-${Date.now()}`,
      patient_details: {
        username: patient.name,
        age: patient.age,
        biologicalSex: patient.gender,
        mobile: patient.mobile,
      },
    });
    // ──────────────────────────────────────────────────────────

    log('startForPatient', { patient: patient.name }, false);
  }
</script>

</body>
</html>
